name: Run GSE Trading Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 9-15 * * 1-5' # Every 10 minutes from 9:00 to 15:59, Mon-Fri

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download history artifact
        uses: actions/download-artifact@v3
        with:
          name: trading-history
          path: .
        continue-on-error: true # It's okay if it doesn't exist on the first run

      - name: Run trading bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Upload history artifact
        uses: actions/upload-artifact@v3
        with:
          name: trading-history
          path: |
            history.json
            volume.json
          retention-days: 7
